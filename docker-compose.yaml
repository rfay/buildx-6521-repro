name: ddev-testpkgwordpress
services:
  db:
    build:
      context: .dbimageBuild
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ddev/ddev-dbserver-mariadb-11.8:v1.25.0
        gid: "1000"
        uid: "1000"
        username: rfay
    cap_add:
      - SYS_NICE
    command: []
    container_name: ddev-TestPkgWordpress-db
    environment:
      BITNAMI_VOLUME_DIR: ""
      COLUMNS: "80"
      DDEV_DATABASE: mariadb:11.8
      DDEV_DATABASE_FAMILY: mysql
      DDEV_GID: "1000"
      DDEV_GOARCH: arm64
      DDEV_GOOS: linux
      DDEV_HOSTNAME: testpkgwordpress.ddev.site
      DDEV_PHP_VERSION: "8.4"
      DDEV_PRIMARY_URL: https://testpkgwordpress.ddev.site
      DDEV_PRIMARY_URL_PORT: "443"
      DDEV_PRIMARY_URL_WITHOUT_PORT: https://testpkgwordpress.ddev.site
      DDEV_PROJECT: TestPkgWordpress
      DDEV_PROJECT_TYPE: wordpress
      DDEV_ROUTER_HTTP_PORT: "80"
      DDEV_ROUTER_HTTPS_PORT: "443"
      DDEV_SCHEME: https
      DDEV_SITENAME: TestPkgWordpress
      DDEV_TLD: ddev.site
      DDEV_UID: "1000"
      DDEV_USER: rfay
      DDEV_VERSION: v1.25.0-19-gd16e244fc
      DOCKER_IP: 127.0.0.1
      HOST_DOCKER_INTERNAL_IP: 172.17.0.1
      IS_DDEV_PROJECT: "true"
      LINES: "24"
      MYSQL_HISTFILE: /mnt/ddev-global-cache/mysqlhistory/TestPkgWordpress-db/mysql_history
      PGDATABASE: db
      PGHOST: 127.0.0.1
      PGPASSWORD: db
      PGUSER: db
      POSTGRES_DB: db
      POSTGRES_PASSWORD: db
      POSTGRES_USER: db
      TZ: America/Denver
      USER: rfay
    extra_hosts:
      - host.docker.internal=host-gateway
    hostname: TestPkgWordpress-db
    healthcheck:
      test:
        - CMD-SHELL
        - /healthcheck.sh
      timeout: 1m10s
      interval: 1s
      retries: 70
      start_period: 2m0s
      start_interval: 1s
    image: ddev/ddev-dbserver-mariadb-11.8:v1.25.0-TestPkgWordpress-built
    labels:
      com.ddev.app-type: wordpress
      com.ddev.approot: /home/rfay/tmp/ddevtest/TestPkgWordpress775195488
      com.ddev.platform: ddev
      com.ddev.site-name: TestPkgWordpress
    networks:
      ddev_default: null
      default: null
    ports:
      - mode: ingress
        host_ip: 127.0.0.1
        target: 3306
        protocol: tcp
    restart: "no"
    stop_grace_period: 1m0s
    user: 1000:1000
    volumes:
      - type: volume
        source: database
        target: /var/lib/mysql
        volume:
          nocopy: true
      - type: volume
        source: ddev-config
        target: /mnt/ddev_config
        volume: {}
      - type: volume
        source: snapshots
        target: /mnt/snapshots
        volume: {}
      - type: volume
        source: ddev-global-cache
        target: /mnt/ddev-global-cache
        volume: {}
    working_dir: /home/rfay
  web:
    build:
      context: .webimageBuild
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ddev/ddev-webserver:20260204_stasadev_avif
        DDEV_DATABASE: mariadb:11.8
        DDEV_PHP_VERSION: "8.4"
        gid: "1000"
        uid: "1000"
        username: rfay
    cap_add:
      - SYS_PTRACE
    command:
      - /pre-start.sh
    container_name: ddev-TestPkgWordpress-web
    environment:
      COLUMNS: "80"
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
      COREPACK_HOME: /mnt/ddev-global-cache/corepack
      DDEV_APPROOT: /var/www/html
      DDEV_COMPOSER_ROOT: /var/www/html
      DDEV_DATABASE: mariadb:11.8
      DDEV_DATABASE_FAMILY: mysql
      DDEV_DOCROOT: ""
      DDEV_FILES_DIR: /var/www/html/wp-content/uploads
      DDEV_FILES_DIRS: /var/www/html/wp-content/uploads
      DDEV_GID: "1000"
      DDEV_GOARCH: arm64
      DDEV_GOOS: linux
      DDEV_HOSTNAME: testpkgwordpress.ddev.site
      DDEV_MUTAGEN_ENABLED: "true"
      DDEV_PHP_VERSION: "8.4"
      DDEV_PRIMARY_URL: https://testpkgwordpress.ddev.site
      DDEV_PRIMARY_URL_PORT: "443"
      DDEV_PRIMARY_URL_WITHOUT_PORT: https://testpkgwordpress.ddev.site
      DDEV_PROJECT: TestPkgWordpress
      DDEV_PROJECT_TYPE: wordpress
      DDEV_ROUTER_HTTP_PORT: "80"
      DDEV_ROUTER_HTTPS_PORT: "443"
      DDEV_SCHEME: https
      DDEV_SITENAME: TestPkgWordpress
      DDEV_TLD: ddev.site
      DDEV_UID: "1000"
      DDEV_USER: rfay
      DDEV_VERSION: v1.25.0-19-gd16e244fc
      DDEV_WEB_ENTRYPOINT: /mnt/ddev_config/web-entrypoint.d
      DDEV_WEBSERVER_TYPE: nginx-fpm
      DDEV_XDEBUG_ENABLED: "false"
      DDEV_XHPROF_MODE: xhgui
      DEPLOY_NAME: local
      DOCKER_IP: 127.0.0.1
      DOCROOT: ""
      DRUSH_OPTIONS_URI: https://testpkgwordpress.ddev.site
      HOST_DOCKER_INTERNAL_IP: 172.17.0.1
      HTTP_EXPOSE: 80:80,8025:8025
      HTTPS_EXPOSE: 443:80,8026:8025
      IS_DDEV_PROJECT: "true"
      LINES: "24"
      MYSQL_HISTFILE: /mnt/ddev-global-cache/mysqlhistory/TestPkgWordpress-web/mysql_history
      NODE_EXTRA_CA_CERTS: /mnt/ddev-global-cache/mkcert/rootCA.pem
      PGDATABASE: db
      PGHOST: db
      PGPASSWORD: db
      PGUSER: db
      PHP_IDE_CONFIG: serverName=TestPkgWordpress.ddev.site
      SSH_AUTH_SOCK: /home/.ssh-agent/socket
      START_SCRIPT_TIMEOUT: "115"
      TZ: America/Denver
      USER: rfay
      VIRTUAL_HOST: testpkgwordpress.ddev.site
      npm_config_cache: /mnt/ddev-global-cache/npm
    extra_hosts:
      - host.docker.internal=host-gateway
    hostname: TestPkgWordpress-web
    healthcheck:
      test:
        - CMD-SHELL
        - /healthcheck.sh
      timeout: 1m10s
      interval: 1s
      retries: 70
      start_period: 2m0s
      start_interval: 1s
    image: ddev/ddev-webserver:20260204_stasadev_avif-TestPkgWordpress-built
    labels:
      com.ddev.app-type: wordpress
      com.ddev.approot: /home/rfay/tmp/ddevtest/TestPkgWordpress775195488
      com.ddev.platform: ddev
      com.ddev.site-name: TestPkgWordpress
    networks:
      ddev_default: null
      default: null
    ports:
      - mode: ingress
        host_ip: 127.0.0.1
        target: 80
        protocol: tcp
      - mode: ingress
        host_ip: 127.0.0.1
        target: 443
        protocol: tcp
      - mode: ingress
        host_ip: 127.0.0.1
        target: 8025
        protocol: tcp
    restart: "no"
    user: 1000:1000
    volumes:
      - type: volume
        source: project_mutagen
        target: /var/www
        volume:
          nocopy: true
      - type: volume
        source: project_mutagen
        target: /tmp/project_mutagen
        volume:
          nocopy: true
      - type: volume
        source: ddev-config
        target: /mnt/ddev_config
        volume: {}
      - type: volume
        source: ddev-global-cache
        target: /mnt/ddev-global-cache
        volume: {}
      - type: volume
        source: ddev-ssh-agent_socket_dir
        target: /home/.ssh-agent
        volume: {}
    working_dir: /var/www/html/
  xhgui:
    profiles:
      - xhgui
    container_name: ddev-TestPkgWordpress-xhgui
    depends_on:
      db:
        condition: service_started
        required: true
    environment:
      DDEV_DATABASE_FAMILY: mysql
      HOST_DOCKER_INTERNAL_IP: 172.17.0.1
      HTTP_EXPOSE: 8143:80
      HTTPS_EXPOSE: 8142:80
      TZ: America/Denver
      VIRTUAL_HOST: testpkgwordpress.ddev.site
      XHGUI_PDO_PASS: db
      XHGUI_PDO_USER: db
      XHGUI_SAVE_HANDLER: pdo
    extra_hosts:
      - host.docker.internal=host-gateway
    healthcheck:
      test:
        - CMD-SHELL
        - /healthcheck.sh
      timeout: 1m10s
      interval: 1s
      retries: 70
      start_period: 2m0s
      start_interval: 1s
    image: ddev/ddev-xhgui:v1.25.0
    labels:
      com.ddev.approot: /home/rfay/tmp/ddevtest/TestPkgWordpress775195488
      com.ddev.site-name: TestPkgWordpress
    networks:
      ddev_default: null
      default: null
    restart: "no"
    x-ddev:
      describe-url-port: 'Launch: ddev xhgui'
networks:
  ddev_default:
    name: ddev_default
    external: true
  default:
    name: ddev-testpkgwordpress_default
    labels:
      com.ddev.platform: ddev
volumes:
  database:
    name: TestPkgWordpress-mariadb
    external: true
  ddev-config:
    name: TestPkgWordpress-ddev-config
    external: true
  ddev-global-cache:
    name: ddev-global-cache
    external: true
  ddev-ssh-agent_socket_dir:
    name: ddev-ssh-agent_socket_dir
    external: true
  project_mutagen:
    name: TestPkgWordpress_project_mutagen
    external: true
  snapshots:
    name: ddev-TestPkgWordpress-snapshots
    external: true
